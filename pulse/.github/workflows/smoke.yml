name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: CLI help
        run: uv run agentcy-pulse --help
      - name: Import smoke
        run: uv run python -c "import agentcy_pulse"
      - name: Test suite
        run: uv run pytest
