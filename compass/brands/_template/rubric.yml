# Evaluation Rubric Template
# Customize dimensions and thresholds for your brand

name: default
description: "Default content evaluation rubric"
pass_threshold: 0.7

dimensions:
  - name: clarity
    description: "Is the content clear and easy to understand?"
    weight: 1.0
    threshold: 0.7
    criteria:
      - Clear language
      - Logical structure
      - No ambiguity

  - name: engagement
    description: "Is the content engaging and compelling?"
    weight: 1.2
    threshold: 0.7
    criteria:
      - Strong hook
      - Maintains interest
      - Call to action

  - name: brand_voice
    description: "Does it match the brand voice?"
    weight: 1.0
    threshold: 0.7
    criteria:
      - Consistent tone
      - Appropriate vocabulary
      - On-brand messaging

  - name: accuracy
    description: "Is the content factually accurate?"
    weight: 1.5
    threshold: 0.8
    criteria:
      - No false claims
      - Verifiable statements
      - Proper context

red_flags:
  - Offensive content
  - Misleading claims
  - Competitor bashing
  - Inappropriate humor
