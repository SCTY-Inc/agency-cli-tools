# Brand Configuration Template
# Copy this directory to create a new brand

name: template
description: "Your brand description"

# Industry/sector (used for subreddit discovery)
# Examples: "B2B SaaS", "Healthcare", "E-commerce", "FinTech"
industry: ""

# Target audience description (used for subreddit discovery)
# Example: "CTOs and engineering leaders at mid-size companies"
target_audience: ""

# Voice and tone guidelines
voice:
  tone: neutral
  vocabulary: general
  patterns: []
  rules: []
  avoid_phrases: []

# Visual identity
visual:
  palette:
    primary: "#000000"
    secondary: "#ffffff"
  typography:
    heading: "system-ui"
    body: "system-ui"

# Social handles (used for intel scraping)
handles:
  # twitter: your_handle
  # linkedin: your_handle
  # instagram: your_handle

# Platforms and their specific configs
platforms:
  twitter:
    enabled: true
    max_length: 280
  linkedin:
    enabled: true
    max_length: 3000
  instagram:
    enabled: false

# Keywords for signal monitoring
keywords: []

# Competitor brands to track
competitors: []

# Subreddits to monitor (auto-suggested from keywords if empty)
# Example: ["startups", "SaaS", "marketing"]
subreddits: []

# RSS feeds to monitor (uses defaults if empty)
# Example: ["https://news.ycombinator.com/rss"]
feeds: []

# Phrases to filter out of signals
stop_phrases: []

# Autonomous operation policy
# Controls what the system can do without human intervention
policy:
  enabled: true  # Master switch for autonomous operation

  # Default behavior when no rule matches: allow, escalate, deny
  default_verdict: escalate

  # Global thresholds
  global_min_confidence: 0.7  # Minimum confidence for any autonomous action
  global_cooldown_minutes: 5  # Minimum time between similar actions

  # Decision types that are always autonomous (pre-approved)
  always_allow:
    - signal_action

  # Decision types that always require human review
  always_escalate:
    - budget_allocation
    - alert_escalation

  # Decision types that are blocked entirely
  always_deny: []

  # Specific rules (evaluated in order)
  rules:
    - name: content-auto-publish
      description: Auto-publish content with high confidence
      decision_types:
        - content_publish
        - content_schedule
      min_confidence: 0.8
      min_signals: 2
      max_per_hour: 5
      max_per_day: 20
      cooldown_minutes: 10
      escalate_keywords:
        - controversial
        - political
        - urgent

    - name: threat-monitoring
      description: Auto-respond to routine threats
      decision_types:
        - threat_response
      min_confidence: 0.85
      min_signals: 3
      cooldown_minutes: 30
      escalate_on_negative_sentiment: true

  # Notification settings
  notify_on_escalate: true
  notify_channels:
    - cli
    # - slack
    # - email

# Additional metadata
metadata: {}
