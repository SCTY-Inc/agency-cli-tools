# brandOS Docker Compose Configuration
# Use: docker compose up -d

services:
  # Main autonomous loop
  loop:
    build: .
    container_name: brandos-loop
    restart: unless-stopped
    volumes:
      - ./brands:/app/brands:ro  # Brand configs (read-only)
      - brandos-data:/data/brandos  # Persistent data
    environment:
      - BRANDOPS_DATA_DIR=/data/brandos
      # API keys (set in .env or pass directly)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Optional: Slack for escalations
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "from brand_os.loop import LoopState; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Redis for signal queuing (Phase 2)
  # redis:
  #   image: redis:7-alpine
  #   container_name: brandos-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  brandos-data:
  # redis-data:

# Development override: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
